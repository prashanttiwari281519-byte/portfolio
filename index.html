<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prashant Tiwari | Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        :root {
            --bg: #020617;
            --card-glass: rgba(15, 23, 42, 0.6);
            --accent: #38bdf8;
            --text-p: #94a3b8;
            --border-glow: rgba(56, 189, 248, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
            line-height: 1.6;
            overflow-x: hidden;
        }

        #hero-canvas {
            position: fixed;
            top: 0; left: 0;
            z-index: -1;
            pointer-events: none;
        }

        /* Navigation */
        nav {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            padding: 12px 30px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
            display: flex;
            gap: 2rem;
        }

        nav a { color: var(--text-p); text-decoration: none; font-size: 0.9rem; transition: 0.3s; font-weight: 500;}
        nav a:hover { color: var(--accent); }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 120px 20px;
        }

        /* Hero */
        .hero { text-align: center; margin-bottom: 100px; }
        
        .profile-pic {
            width: 160px; height: 160px;
            border-radius: 40px;
            object-fit: cover;
            border: 2px solid var(--accent);
            padding: 5px;
            margin-bottom: 1.5rem;
            transition: 0.5s;
        }

        h1 {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            background: linear-gradient(to bottom, #fff, #64748b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline {
            color: var(--accent);
            text-transform: uppercase;
            letter-spacing: 4px;
            font-size: 0.8rem;
        }

        /* Certificates */
        .cert-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            margin: 50px 0 100px;
        }

        .cert-card {
            background: var(--card-glass);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 24px;
            padding: 20px;
            transition: 0.4s;
        }

        .cert-card:hover {
            transform: translateY(-10px);
            border-color: var(--accent);
            box-shadow: 0 10px 30px rgba(56, 189, 248, 0.1);
        }

        .cert-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 15px;
            margin-bottom: 15px;
        }

        /* Contact Form */
        .contact-wrap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 50px;
            background: var(--card-glass);
            padding: 50px;
            border-radius: 32px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .input-group label { color: var(--accent); font-size: 0.75rem; text-transform: uppercase; }
        
        .input-group input, .input-group textarea {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 12px;
            color: white;
            margin: 8px 0 20px;
            outline: none;
        }

        button {
            background: var(--accent);
            color: var(--bg);
            padding: 15px;
            border-radius: 12px;
            border: none;
            font-weight: 800;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }

        button:hover:not(:disabled) { transform: scale(1.02); opacity: 0.9; }
        button:disabled { background: #475569; cursor: not-allowed; }

        @media (max-width: 768px) {
            .contact-wrap { padding: 30px; }
        }
    </style>
</head>
<body>

<canvas id="hero-canvas"></canvas>

<nav>
    <a href="#home">Home</a>
    <a href="#certs">Certs</a>
    <a href="#contact">Contact</a>
</nav>

<div class="container">
    <section id="home" class="hero">
        <img src="YOUR_PROFILE_PIC.jpg" alt="Prashant Tiwari" class="profile-pic">
        <h1>Prashant Tiwari</h1>
        <p class="tagline">Crafting Digital Excellence 🦅</p>
    </section>

    <section id="certs">
        <div style="margin-bottom: 40px;">
            <h2>Recognitions</h2>
            <p style="color: var(--text-p)">Industry validated expertise.</p>
        </div>
        
        <div class="cert-grid">
            <div class="cert-card">
                <img src="aws.jpeg" alt="AWS">
                <h3>AWS Cloud</h3>
                <p style="color: var(--text-p); font-size: 0.85rem;">Cloud Foundation Specialist</p>
            </div>
            <div class="cert-card">
                <img src="front end.jpeg" alt="Frontend">
                <h3>Frontend Dev</h3>
                <p style="color: var(--text-p); font-size: 0.85rem;">Modern UI/UX Engineering</p>
            </div>
            <div class="cert-card">
                <img src="git hub.jpeg" alt="GitHub">
                <h3>Git & Versioning</h3>
                <p style="color: var(--text-p); font-size: 0.85rem;">Collaborative Engineering</p>
            </div>
        </div>
    </section>

    <section id="contact" class="contact-wrap">
        <div>
            <h2 style="font-size: 2.5rem; line-height: 1.1;">Let's Talk</h2>
            <p style="color: var(--text-p); margin-top: 15px;">Send a message and I'll get back to you shortly.</p>
        </div>
        <form id="portfolioForm">
            <div class="input-group">
                <label>Name</label>
                <input type="text" id="name" placeholder="Prashant" required>
            </div>
            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
            </div>
            <div class="input-group">
                <label>Message</label>
                <textarea id="message" rows="4" placeholder="Hi Prashant, let's work together!" required></textarea>
            </div>
            <button type="submit" id="submitBtn">Send Message</button>
            <p id="status" style="margin-top: 15px; text-align: center; font-size: 0.9rem;"></p>
        </form>
    </section>
</div>

<script>
/** 1. SUPABASE INITIALIZATION **/
const supabaseUrl = 'https://rjxwgzbvxfqfcrggtgpz.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJqeHdnemJ2eGZxZmNyZ2d0Z3B6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIwODQ3MDAsImV4cCI6MjA4NzY2MDcwMH0.wOONGM22tabx1s-5U4xsnqIggZ6Sq-Os2ul1dmIMS8U';
const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

/** 2. THREE.JS BACKGROUND ANIMATION **/
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('hero-canvas'), alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);

const starsGeometry = new THREE.BufferGeometry();
const starsCount = 1500;
const posArray = new Float32Array(starsCount * 3);

for(let i = 0; i < starsCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 10;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
const starsMaterial = new THREE.PointsMaterial({ size: 0.005, color: '#38bdf8' });
const starsMesh = new THREE.Points(starsGeometry, starsMaterial);
scene.add(starsMesh);

camera.position.z = 2;

function animate() {
    requestAnimationFrame(animate);
    starsMesh.rotation.y += 0.001;
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

/** 3. FORM HANDLER **/
document.getElementById("portfolioForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const btn = document.getElementById("submitBtn");
    const status = document.getElementById("status");

    btn.innerText = "Sending...";
    btn.disabled = true;

    const formData = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        message: document.getElementById("message").value
    };

    const { error } = await _supabase.from('feedback').insert([formData]);

    if (error) {
        status.innerText = "Error: " + error.message;
        status.style.color = "#ef4444";
    } else {
        status.innerText = "Success! Message sent.";
        status.style.color = "#38bdf8";
        e.target.reset();
    }
    
    btn.innerText = "Send Message";
    btn.disabled = false;
});
</script>
</body>
</html>
